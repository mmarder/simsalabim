name = "kk-status"
main = "worker.js"
compatibility_date = "2025-01-01"

# KV namespace for the latest status. Create it once and paste the id here:
#   wrangler kv namespace create STATUS_KV
[[kv_namespaces]]
binding = "STATUS_KV"
id = "de1d91363a8c447fbe19bbb621c521a6"

# INGEST_TOKEN is a SECRET, not set here. Set it with:
#   wrangler secret put INGEST_TOKEN
# (must match TELEMETRY_TOKEN in the firmware's config_secrets.h)
