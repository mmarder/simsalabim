; Kältekammer ESP32 — PlatformIO configuration
; See ARCHITECTURE.md §13

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = spiffs
board_build.partitions = partitions_ota.csv

lib_deps =
  ; Phase 0 — network, OTA, LCD, JSON
  esp32async/ESPAsyncWebServer
  esp32async/AsyncTCP
  ayushsharma82/ElegantOTA
  bblanchon/ArduinoJson@^7
  marcoschwartz/LiquidCrystal_I2C
  ESP32Time
  paulstoffregen/OneWire        ; OneWire bus enumeration (hardware status / DS18B20)
  ; Phase 1+ sensor/Modbus libs are added when those modules land:
  ;   milesburton/DallasTemperature
  ;   robtillaart/SHT31          ; verify registry name before use
  ;   4-20ma/ModbusMaster

build_flags =
  ; ElegantOTA must use the async backend (AsyncWebServer)
  -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1

[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = 192.168.1.50          ; ← set to the ESP32's reserved IP
upload_flags = --auth=kk-samosir

; Host-native test environment — runs unit tests without hardware.
; Business logic must be hardware-free to compile here (see DEVELOPMENT.md Phase 3).
[env:native]
platform = native
test_framework = unity
; Tests include the header-only pure modules directly (e.g. ota_version.h);
; do NOT compile the Arduino src/ tree on the host.
test_build_src = no
build_flags = -std=gnu++17 -I src
